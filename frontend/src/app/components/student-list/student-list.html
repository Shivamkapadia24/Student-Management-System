<div class="card p-4 shadow-sm border-0">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="mb-0 text-primary">Student List</h3>
    <div class="d-flex gap-2 align-items-center">
      <button class="btn btn-primary btn-sm px-3" (click)="addStudentClicked.emit()">
        Add Student
      </button>
      <span class="badge bg-secondary fs-6 py-2">Total: {{ students.length }}</span>
    </div>
  </div>

  <div class="row g-2 mb-3">
    <div class="col-md-8">
      <input
        type="text"
        class="form-control form-control-sm"
        placeholder="Search by name or course..."
        [(ngModel)]="searchQuery">
    </div>
    <div class="col-md-4">
      <select class="form-select form-select-sm" [(ngModel)]="selectedCourse">
        <option *ngFor="let course of uniqueCourses" [value]="course">
          {{ course === 'All' ? 'All Courses' : course }}
        </option>
      </select>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-hover align-middle">
      <thead class="table-light">
        <tr>
          <th>Name</th>
          <th>Course</th>
          <th>Roll Number</th>
          <th class="text-center" style="width: 180px;">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let student of filteredStudents">
          <td class="fw-semibold">{{ student.name }}</td>
          <td>{{ student.course }}</td>
          <td>{{ student.rollNumber }}</td>
          <td class="text-center">
            <div class="d-flex justify-content-center gap-2">
              <button
                class="btn btn-sm btn-outline-primary px-3"
                (click)="onEdit(student)">
                Edit
              </button>
              <button
                class="btn btn-sm btn-outline-danger px-3"
                (click)="onDelete(student._id)">
                Delete
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="filteredStudents.length === 0">
          <td colspan="4" class="text-center text-muted py-4">
            No students found.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
