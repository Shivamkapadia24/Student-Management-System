<div class="card p-4 mb-4 shadow-sm border-0">

  <h3 class="mb-3 text-primary">{{ isEditMode ? 'Edit Student' : 'Add Student' }}</h3>

  <form [formGroup]="studentForm" (ngSubmit)="onSubmit()">

    <div class="mb-3">
      <label class="form-label fw-bold">Name</label>
      <input
        type="text"
        class="form-control"
        formControlName="name"
        placeholder="Enter student name"
        [class.is-invalid]="studentForm.get('name')?.touched && studentForm.get('name')?.invalid">
      <div *ngIf="studentForm.get('name')?.touched && studentForm.get('name')?.errors?.['required']" class="invalid-feedback">
        Name is required.
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">Course</label>
      <input
        type="text"
        class="form-control"
        formControlName="course"
        placeholder="Enter course (e.g. IT, CS)"
        [class.is-invalid]="studentForm.get('course')?.touched && studentForm.get('course')?.invalid">
      <div *ngIf="studentForm.get('course')?.touched && studentForm.get('course')?.errors?.['required']" class="invalid-feedback">
        Course is required.
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">Roll Number</label>
      <input
        type="number"
        class="form-control"
        formControlName="rollNumber"
        placeholder="Enter roll number"
        [class.is-invalid]="studentForm.get('rollNumber')?.touched && studentForm.get('rollNumber')?.invalid">
      <div *ngIf="studentForm.get('rollNumber')?.touched && (studentForm.get('rollNumber')?.errors?.['required'] || studentForm.get('rollNumber')?.errors?.['min'])" class="invalid-feedback">
        Roll Number is required and must be greater than 0.
      </div>
    </div>

    <div class="d-flex gap-2">
      <button
        class="btn btn-primary px-4"
        type="submit"
        [disabled]="studentForm.invalid">
        {{ isEditMode ? 'Update' : 'Submit' }}
      </button>
      <button
        class="btn btn-outline-secondary px-4"
        type="button"
        (click)="resetForm()">
        Cancel
      </button>
    </div>

  </form>

</div>
