<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="card p-4 shadow-sm border-0" style="width: 100%; max-width: 400px;">
    
    <h3 class="text-center text-primary mb-3">
      {{ isLoginMode ? 'Sign In' : 'Create Account' }}
    </h3>

    <div *ngIf="errorMessage" class="alert alert-danger p-2 text-center small">
      {{ errorMessage }}
    </div>

    <form [formGroup]="authForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label fw-bold">College Name</label>
        <input type="text" class="form-control" formControlName="username" placeholder="Enter college name">
      </div>

      <div class="mb-4">
        <label class="form-label fw-bold">Password</label>
        <input type="password" class="form-control" formControlName="password" placeholder="Enter password">
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3" [disabled]="authForm.invalid">
        {{ isLoginMode ? 'Login' : 'Register' }}
      </button>

      <div class="text-center">
        <a href="javascript:void(0)" (click)="toggleMode()" class="small text-decoration-none">
          {{ isLoginMode ? "Don't have an account? Register" : "Already have an account? Login" }}
        </a>
      </div>
    </form>

  </div>
</div>
